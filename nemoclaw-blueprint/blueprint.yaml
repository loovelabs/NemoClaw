# LOOVE fork: added anthropic profile for native Anthropic provider support.

version: "0.1.0"
min_openshell_version: "0.1.0"
min_openclaw_version: "2026.3.0"
digest: ""  # Computed at release time

profiles:
  - default
  - ncp
  - nim-local
  - vllm
  - anthropic

description: |
  NemoClaw blueprint (LOOVE fork): orchestrates OpenClaw sandbox creation,
  migration, and inference routing inside OpenShell. Adds native Anthropic
  provider support for Claude models.

components:
  sandbox:
    image: "ghcr.io/nvidia/openshell-community/sandboxes/openclaw:latest"
    name: "openclaw"
    forward_ports:
      - 18789

  inference:
    profiles:
      default:
        provider_type: "nvidia"
        provider_name: "nvidia-inference"
        endpoint: "https://integrate.api.nvidia.com/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"

      ncp:
        provider_type: "nvidia"
        provider_name: "nvidia-ncp"
        endpoint: ""
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NVIDIA_API_KEY"
        dynamic_endpoint: true

      nim-local:
        provider_type: "openai"
        provider_name: "nim-local"
        endpoint: "http://nim-service.local:8000/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NIM_API_KEY"

      vllm:
        provider_type: "openai"
        provider_name: "vllm-local"
        endpoint: "http://localhost:8000/v1"
        model: "nvidia/nemotron-3-nano-30b-a3b"
        credential_env: "OPENAI_API_KEY"
        credential_default: "dummy"

      anthropic:
        provider_type: "anthropic"
        provider_name: "anthropic-native"
        endpoint: "https://api.anthropic.com"
        model: "anthropic/claude-opus-4-20250514"
        credential_env: "ANTHROPIC_API_KEY"
        fallback_models:
          - "anthropic/claude-sonnet-4-20250514"
          - "moonshot/kimi-k2.5"
          - "openai/gpt-4o"

  policy:
    base: "sandboxes/openclaw/policy.yaml"
    additions:
      nim_service:
        name: nim_service
        endpoints:
          - host: "nim-service.local"
            port: 8000
            protocol: rest
      anthropic_api:
        name: anthropic_api
        endpoints:
          - host: "api.anthropic.com"
            port: 443
            protocol: rest
      moonshot_api:
        name: moonshot_api
        endpoints:
          - host: "api.moonshot.ai"
            port: 443
            protocol: rest
